<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <style>
:root {
  color-scheme: light;
  --ink: #171614;
  --muted: #66645c;
  --paper: #fffdf6;
  --wash: #f3efe3;
  --line: rgba(23, 22, 20, 0.16);
  --accent: #0f8f8c;
  --accent-soft: rgba(15, 143, 140, 0.11);
  --amber: #c98713;
  --green: #2d7653;
  --blue: #315d9b;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  overflow-x: hidden;
  background: #f5f1e8;
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

a {
  color: inherit;
  text-decoration-color: rgba(15, 143, 140, 0.55);
  text-underline-offset: 3px;
}

code {
  padding: 1px 4px;
  background: rgba(23, 22, 20, 0.08);
  border-radius: 4px;
  font-size: 0.92em;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  gap: 18px;
  align-items: center;
  justify-content: space-between;
  min-height: 64px;
  padding: 10px clamp(18px, 4vw, 44px);
  border-bottom: 1px solid var(--line);
  background: rgba(255, 253, 246, 0.88);
  backdrop-filter: blur(16px);
}

.brand {
  display: grid;
  gap: 2px;
  text-decoration: none;
}

.brand span {
  font-weight: 800;
}

.brand small,
.section-heading span,
.artifact small,
.decision small {
  color: var(--muted);
  font-size: 12px;
}

nav {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

nav a {
  min-height: 34px;
  padding: 8px 10px;
  border: 1px solid transparent;
  border-radius: 999px;
  font-size: 13px;
  text-decoration: none;
  transition: border-color 160ms ease, background 160ms ease;
}

nav a:hover {
  border-color: var(--line);
  background: rgba(255, 255, 255, 0.62);
}

.hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
  gap: 32px;
  align-items: start;
  width: min(1180px, calc(100vw - 36px));
  margin: 0 auto;
  padding: 28px 0;
  border-bottom: 1px solid var(--line);
}

.hero-copy {
  max-width: 760px;
}

.eyebrow {
  margin: 0 0 12px;
  color: var(--accent);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

h1,
h2,
h3,
p {
  margin: 0;
}

h1 {
  max-width: 760px;
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(36px, 4.2vw, 56px);
  font-weight: 700;
  line-height: 1.02;
}

h2 {
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(30px, 3vw, 44px);
  line-height: 1.05;
}

h3 {
  font-size: 18px;
  line-height: 1.24;
}

.lede {
  max-width: 700px;
  margin-top: 14px;
  color: #37352f;
  font-size: clamp(17px, 1.7vw, 21px);
  line-height: 1.4;
}

.source-line {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 26px;
}

.source-line a,
.hero-note span,
.milestone span,
.artifact span,
.decision span,
.session summary span {
  width: fit-content;
  padding: 5px 8px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.55);
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  text-decoration: none;
  text-transform: uppercase;
}

.hero-note {
  padding: 20px;
  border-left: 5px solid var(--accent);
  background: var(--paper);
  box-shadow: 5px 5px 0 rgba(23, 22, 20, 0.07);
}

.hero-note strong {
  display: block;
  margin-top: 12px;
  font-size: 24px;
  line-height: 1.12;
}

.hero-note p {
  margin-top: 18px;
  color: var(--muted);
  line-height: 1.5;
}

.band {
  width: min(1180px, calc(100vw - 36px));
  margin: 0 auto;
  padding: 38px 0;
  border-bottom: 1px solid var(--line);
}

.section-heading {
  display: flex;
  gap: 18px;
  align-items: end;
  justify-content: space-between;
  margin-bottom: 28px;
}

.section-heading > div {
  display: grid;
  gap: 8px;
}

.claim-sheet {
  border-top: 2px solid var(--ink);
  background: var(--paper);
}

.claim {
  display: grid;
  grid-template-columns: minmax(180px, 250px) minmax(0, 1fr);
  gap: 20px 28px;
  padding: 22px 0;
  border-bottom: 1px solid var(--line);
}

.claim:last-child {
  border-bottom: 0;
}

.statement {
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(20px, 2vw, 28px);
  line-height: 1.18;
}

.claim-meta {
  display: grid;
  grid-column: 1 / -1;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

.claim-meta div,
.thread,
.decision,
.artifact,
.session {
  background: transparent;
}

.claim-meta div {
  min-width: 0;
  padding: 14px 14px 0 0;
  border-top: 1px solid var(--line);
}

b,
dt {
  display: block;
  margin-bottom: 8px;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.claim-meta p,
.claim-meta li,
.thread p,
.thread dd,
.artifact p,
.decision p,
.decision div,
.session p,
.session li {
  color: #4b4941;
  font-size: 14px;
  line-height: 1.5;
}

.claim-meta p,
.thread dd p,
.session p,
.decision p {
  max-width: 72ch;
}

ul {
  margin: 0;
  padding-left: 18px;
}

table {
  display: block;
  width: 100%;
  max-width: 100%;
  margin-top: 10px;
  overflow-x: auto;
  border-collapse: collapse;
  background: rgba(255, 253, 246, 0.78);
  font-size: 13px;
}

th,
td {
  padding: 8px 9px;
  border: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
}

th {
  color: #37352f;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.timeline-list {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 0 28px;
  margin: 0;
  padding: 0;
  list-style: none;
}

.milestone {
  position: relative;
  min-height: 150px;
  padding: 0 0 28px 34px;
  border-left: 2px solid var(--line);
}

.milestone::before {
  position: absolute;
  top: 2px;
  left: -7px;
  width: 12px;
  height: 12px;
  border: 2px solid var(--ink);
  border-radius: 50%;
  background: var(--wash);
  content: "";
}

.milestone.complete::before {
  background: var(--green);
}

.milestone.planned::before {
  background: var(--amber);
}

.milestone h3,
.artifact h3,
.decision h3,
.thread h3 {
  margin: 12px 0 8px;
}

.milestone p,
.milestone small {
  display: block;
  max-width: 620px;
  color: var(--muted);
  line-height: 1.45;
}

.split {
  display: grid;
  grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
  gap: 36px;
  align-items: start;
}

.sticky {
  position: sticky;
  top: 92px;
}

.session-list {
  display: grid;
  gap: 14px;
}

.session {
  border-top: 1px solid var(--ink);
  padding: 18px 0;
}

.session summary {
  display: grid;
  grid-template-columns: 110px minmax(0, 1fr);
  gap: 14px;
  align-items: center;
  cursor: pointer;
  list-style: none;
}

.session summary::-webkit-details-marker {
  display: none;
}

.objective {
  margin: 14px 0 0 124px;
}

.session-fields {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
  margin-top: 18px;
}

.session-fields > div {
  min-width: 0;
}

.session footer {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
  margin-top: 18px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
  color: var(--muted);
  font-size: 13px;
}

.thread-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 20px;
}

.thread {
  padding: 18px 0 18px 18px;
  border-left: 5px solid var(--accent);
}

.thread dl {
  display: grid;
  gap: 10px;
  margin: 18px 0 0;
}

.thread dd {
  margin: 0;
}

.artifact-table,
.decision-list {
  display: grid;
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
}

.artifact,
.decision {
  display: grid;
  grid-template-columns: minmax(190px, 0.55fr) minmax(260px, 1fr) minmax(160px, 0.35fr);
  gap: 18px;
  align-items: start;
  min-width: 0;
  padding: 18px;
  background: var(--paper);
}

.decision {
  grid-template-columns: 82px minmax(220px, 0.7fr) minmax(260px, 1fr);
}

.artifact span,
.decision span {
  border-color: rgba(15, 143, 140, 0.28);
  color: var(--accent);
}

.artifact:hover,
.decision:hover,
.thread:hover,
.session:hover {
  background: #fffefa;
  transition: background 160ms ease;
}

@media (max-width: 980px) {
  .topbar,
  .hero,
  .split,
  .claim,
  .claim-meta,
  .timeline-list,
  .thread-grid,
  .session-fields,
  .artifact,
  .decision {
    grid-template-columns: 1fr;
  }

  .hero {
    padding-top: 26px;
  }

  .section-heading {
    display: grid;
    align-items: start;
  }

  .sticky {
    position: static;
  }

  .objective {
    margin-left: 0;
  }
}

@media (max-width: 640px) {
  .topbar {
    padding-right: 16px;
    padding-left: 16px;
  }

  .band,
  .hero {
    width: min(100vw - 28px, 1180px);
  }

  nav {
    justify-content: flex-start;
  }

  .session summary {
    grid-template-columns: 1fr;
  }

  h1 {
    font-size: clamp(34px, 10vw, 44px);
  }
}

/* Archive Atlas direction */
body {
  background:
    linear-gradient(90deg, rgba(47, 43, 35, 0.035) 1px, transparent 1px),
    #ece7dc;
  background-size: 56px 100%;
}

.archive-shell {
  display: grid;
  grid-template-columns: 104px minmax(0, 1fr);
  min-height: 100svh;
}

.atlas-sidebar {
  position: sticky;
  top: 0;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 22px;
  height: 100svh;
  padding: 20px 0;
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.04), transparent),
    #27241f;
  color: #f4efe4;
}

.monogram {
  display: grid;
  width: 54px;
  height: 54px;
  place-items: center;
  margin: 0 auto;
  border: 1px solid rgba(244, 239, 228, 0.38);
  color: #f4efe4;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 20px;
  text-decoration: none;
  box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.04);
}

.atlas-sidebar nav {
  display: grid;
  align-content: start;
  gap: 2px;
  justify-content: stretch;
}

.atlas-sidebar nav a {
  min-height: 38px;
  padding: 11px 14px;
  border: 0;
  border-left: 3px solid transparent;
  border-radius: 0;
  color: rgba(244, 239, 228, 0.82);
  font-size: 12px;
  text-align: left;
}

.atlas-sidebar nav a:hover {
  border-left-color: #b5a16f;
  background: rgba(244, 239, 228, 0.1);
  color: #fffaf0;
}

.atlas-sidebar p {
  margin: 0;
  padding: 0 12px;
  color: rgba(244, 239, 228, 0.6);
  font-size: 11px;
  line-height: 1.45;
}

.archive-main {
  width: min(1320px, calc(100vw - 104px));
  min-width: 0;
  margin: 0 auto;
  padding: 26px clamp(24px, 3vw, 42px) 42px;
}

.archive-hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 240px;
  gap: 32px;
  padding: 22px 0 24px;
  border-bottom: 2px solid rgba(47, 43, 35, 0.55);
}

.archive-hero h1 {

.archive-hero .lede {

}

.archive-stamp {
  align-self: start;

  border: 1px solid rgba(47, 43, 35, 0.2);

}

.archive-stamp span {
  display: block;
  margin-bottom: 12px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.archive-stamp strong {
  display: block;
  font-size: 17px;

}

.archive-stamp p {
  margin-top: 12px;

  font-size: 12px;
  line-height: 1.45;
}

.source-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  margin-top: 18px;
  border: 1px solid var(--line);

}

.source-tabs a {
  min-height: 38px;

  border-right: 1px solid var(--line);
  color: #514a3b;
  font-size: 12px;
  font-weight: 800;
  text-decoration: none;
}

.source-tabs a:hover {

}

.archive-stats {

  grid-template-columns: repeat(6, minmax(0, 1fr));

  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}

.archive-stats div {
  display: grid;
  gap: 4px;
  min-height: 74px;

  border-right: 1px solid var(--line);
}

.archive-stats div:last-child {
  border-right: 0;
}

.archive-stats strong {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 28px;

.archive-stats span {

.claim-meta div {

table {

th {

.timeline-list {

}

.eyebrow {

}

.claim {

.claim h3 {

.statement {

}

.claim-meta {
  grid-template-columns: minmax(260px, 0.95fr) minmax(220px, 0.7fr) minmax(220px, 0.7fr);

.claim-meta div {

.claim-meta div + div {

b,
dt {

.claim-meta p,
.claim-meta li,
.thread p,
.thread dd,
.artifact p,
.decision p,
.decision div,
.session p,
.session li {

ul {
  padding-left: 15px;
}

li + li {

}

code {
  padding: 1px 4px;
  font-size: 0.88em;
}

table {
  font-size: 11px;
}

th,
td {
  padding: 6px 7px;
}

th {
  font-size: 9px;
}

.timeline-list {
  margin-top: 12px;
}

.milestone {
  padding-bottom: 13px;
}

.milestone h3,
.thread h3,
.artifact h3,
.decision h3 {
  font-size: 14px;
}

.milestone p,
.milestone small {

}

.split {

.session {

.session summary {

.session summary strong {

}

.objective {

}

.session-fields {

.session-fields > div {

.session-fields > div + div {

.thread {

}

.thread dl {

}

.decision {

/* Self-contained JS web app shell */
.app-body {
  min-height: 100svh;
  background:
    linear-gradient(90deg, rgba(44, 40, 33, 0.035) 1px, transparent 1px),
    #eee9dd;
  background-size: 56px 100%;
  -webkit-font-smoothing: antialiased;
  text-rendering: geometricPrecision;
}

.app-shell {
  display: grid;
  grid-template-columns: 88px minmax(0, 1fr);
  min-height: 100svh;
}

.app-rail {
  position: sticky;
  top: 0;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 18px;
  height: 100svh;
  padding: 20px 0;
  background: #292621;
  color: #f7f0e2;
}

.app-mark {
  display: grid;
  width: 48px;
  height: 48px;
  place-items: center;
  margin: 0 auto;
  border: 1px solid rgba(247, 240, 226, 0.42);
  color: #fff8e9;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 19px;
  text-decoration: none;
}

.app-rail nav {
  display: grid;
  align-content: start;
  gap: 2px;
}

.app-rail button {
  min-height: 33px;
  padding: 8px 12px;
  border: 0;
  border-left: 3px solid transparent;
  background: transparent;
  color: rgba(247, 240, 226, 0.8);
  cursor: pointer;
  font: inherit;
  font-size: 11px;
  text-align: left;
}

.app-rail button:hover,
.app-rail button.is-active {
  border-left-color: #b49f6b;
  background: rgba(247, 240, 226, 0.1);
  color: #fffaf0;
}

.app-rail p {
  margin: 0;
  padding: 0 12px;
  color: rgba(247, 240, 226, 0.58);
  font-size: 10px;
  line-height: 1.45;
}

.app-main {
  width: min(1240px, calc(100vw - 88px));
  min-width: 0;
  margin: 0 auto;
  padding: 18px clamp(24px, 3vw, 38px) 36px;
}

.app-header {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 280px;
  gap: 28px;
  align-items: start;
  padding: 14px 0 18px;
  border-bottom: 2px solid rgba(47, 43, 35, 0.55);
}

.app-header h1 {
  font-size: clamp(36px, 4vw, 52px);
  line-height: 1;
}

.app-header p {
  max-width: 820px;
  margin-top: 10px;
  color: #494438;
  font-size: 14px;
  line-height: 1.42;
}

.app-kicker {
  margin: 0 0 7px;
  color: #566d63;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.app-search {
  display: grid;
  gap: 8px;
  padding: 12px;
  border: 1px solid var(--line);
  background: rgba(255, 252, 243, 0.62);
}

.app-search span {
  color: var(--muted);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.app-search input {
  width: 100%;
  min-height: 34px;
  border: 1px solid rgba(47, 43, 35, 0.22);
  background: #fffdf6;
  color: var(--ink);
  font: inherit;
  font-size: 13px;
  padding: 7px 9px;
}

.source-tabs {
  margin-top: 12px;
}

.app-stats {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  margin: 12px 0 18px;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}

.app-stats button {
  display: grid;
  gap: 3px;
  min-height: 52px;
  place-items: center;
  border: 0;
  border-right: 1px solid var(--line);
  background: transparent;
  color: var(--ink);
  cursor: default;
}

.app-stats button:last-child {
  border-right: 0;
}

.app-stats strong {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 22px;
  font-weight: 400;
}

.app-stats span {
  color: var(--muted);
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.app-view {
  min-width: 0;
}

.view-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  gap: 14px;
}

.primary-panel {
  grid-column: span 1;
}

.archive-panel {
  min-width: 0;
  border: 1px solid var(--line);
  background: rgba(255, 252, 243, 0.68);
}

.archive-panel > * {
  padding-right: 14px;
  padding-left: 14px;
}

.panel-heading {
  padding-top: 13px;
  padding-bottom: 11px;
  border-bottom: 1px solid var(--line);
}

.panel-heading.row {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 14px;
}

.panel-heading h2 {
  font-size: clamp(22px, 2vw, 30px);
}

.panel-heading button {
  border: 1px solid var(--line);
  background: #fffdf6;
  color: var(--muted);
  cursor: pointer;
  font: inherit;
  font-size: 11px;
  padding: 6px 8px;
}

.claim-line {
  max-width: 820px;
  padding-top: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(17px, 1.45vw, 22px);
  line-height: 1.2;
}

.triad,
.quad {
  display: grid;
  gap: 0;
}

.triad {
  grid-template-columns: minmax(260px, 0.95fr) minmax(220px, 0.7fr) minmax(220px, 0.7fr);
}

.quad {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.triad section,
.quad section {
  min-width: 0;
  padding: 12px 14px 14px;
  border-right: 1px solid var(--line);
}

.triad section:last-child,
.quad section:last-child {
  border-right: 0;
}

.archive-panel p,
.archive-panel li,
.archive-panel dd,
.archive-panel small,
.index-row small {
  color: #4f493d;
  font-size: 12px;
  line-height: 1.42;
}

.archive-panel ul {
  padding-left: 15px;
}

.compact-panel {
  padding: 13px;
}

.compact-panel h3 {
  margin: 0 0 10px;
  font-size: 15px;
}

.index-row {
  display: grid;
  grid-template-columns: 76px minmax(0, 1fr) minmax(110px, 0.42fr);
  gap: 12px;
  align-items: start;
  padding: 11px 14px;
  border-bottom: 1px solid var(--line);
}

.index-row:last-child {
  border-bottom: 0;
}

.index-row span,
.session-record summary span,
.decision-record > span {
  color: var(--muted);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.index-row strong {
  font-size: 13px;
  line-height: 1.25;
}

.view-grid > .archive-panel .artifact-row {
  grid-template-columns: 72px minmax(0, 1fr);
}

.view-grid > .archive-panel .artifact-row small {
  display: none;
}

.artifact-row strong a {
  display: inline;
  overflow-wrap: anywhere;
}

.claim-app {
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
  gap: 14px;
}

.record-list {
  display: grid;
  align-content: start;
  border: 1px solid var(--line);
  background: rgba(255, 252, 243, 0.42);
}

.record-list button {
  display: grid;
  grid-template-columns: 34px 1fr;
  gap: 8px;
  align-items: start;
  min-height: 42px;
  padding: 10px;
  border: 0;
  border-bottom: 1px solid var(--line);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  font: inherit;
  font-size: 12px;
  text-align: left;
}

.record-list button.is-active,
.record-list button:hover {
  background: #fffdf6;
}

.record-list span {
  color: var(--muted);
  font-size: 10px;
  font-weight: 900;
}

.app-timeline {
  margin: 0;
  padding: 12px 14px 4px;
  list-style: none;
}

.app-timeline li {
  position: relative;
  display: grid;
  grid-template-columns: 94px minmax(0, 1fr);
  gap: 18px;
  padding: 0 0 17px 20px;
  border-left: 1px solid rgba(47, 43, 35, 0.26);
}

.app-timeline li::before {
  position: absolute;
  top: 2px;
  left: -5px;
  width: 9px;
  height: 9px;
  border: 1px solid var(--ink);
  border-radius: 50%;
  background: #eee9dd;
  content: "";
}

.app-timeline h3,
.decision-record h3 {
  margin: 0 0 4px;
  font-size: 14px;
}

.session-record {
  padding: 0 14px 12px;
  border-bottom: 1px solid var(--line);
}

.session-record summary {
  display: grid;
  grid-template-columns: 84px minmax(0, 1fr) 80px;
  gap: 12px;
  align-items: center;
  min-height: 42px;
  cursor: pointer;
}

.session-record summary strong {
  font-size: 14px;
}

.session-record summary a {
  font-size: 11px;
}

.session-record footer {
  padding-top: 10px;
  border-top: 1px solid var(--line);
  color: var(--muted);
  font-size: 12px;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

.body-lead {
  padding-top: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}

.stacked-fields section {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
}

.stacked-fields section:last-child {
  border-bottom: 0;
}

.shelf {
  display: grid;
}

.decision-record {
  display: grid;
  grid-template-columns: 64px minmax(220px, 0.72fr) minmax(280px, 1fr);
  gap: 14px;
  padding: 13px 14px;
  border-bottom: 1px solid var(--line);
}

.decision-record:last-child {
  border-bottom: 0;
}

.decision-record small {
  display: block;
  margin-top: 8px;
}

@media (max-width: 1100px) {
  .app-shell {
    grid-template-columns: 1fr;
  }

  .app-rail {
    position: sticky;
    z-index: 20;
    height: auto;
    grid-template-columns: auto 1fr;
    grid-template-rows: auto;
    align-items: center;
    padding: 10px 14px;
  }

  .app-rail p {
    display: none;
  }

  .app-rail nav {
    display: flex;
    flex-wrap: wrap;
  }

  .app-rail button {
    border-left: 0;
    border-bottom: 2px solid transparent;
  }

  .app-main {
    width: min(100vw, 1240px);
  }

  .app-header,
  .view-grid,
  .claim-app,
  .triad,
  .quad,
  .card-grid,
  .decision-record {
    grid-template-columns: 1fr;
  }

  .triad section,
  .quad section {
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }

  .app-stats {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

@media (max-width: 680px) {
  .app-main {
    padding-right: 16px;
    padding-left: 16px;
  }

  .app-stats {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .index-row,
  .session-record summary,
  .app-timeline li {
    grid-template-columns: 1fr;
  }
}

/* Evidence Notebook upgrade: source-ledger workspace with denser review affordances. */
:root {
  --blueprint: #111827;
  --paper-strong: #fffdf7;
  --paper-soft: rgba(255, 253, 247, 0.74);
  --cyan: #168d91;
  --clinical-green: #2f7d57;
  --review-amber: #b7791f;
}

.app-body {
  background:
    linear-gradient(90deg, rgba(22, 141, 145, 0.04) 1px, transparent 1px),
    linear-gradient(rgba(47, 43, 35, 0.025) 1px, transparent 1px),
    #ede8dc;
  background-size: 64px 100%, 100% 28px;
}

.app-rail {
  background:
    linear-gradient(180deg, rgba(22, 141, 145, 0.16), transparent 42%),
    #25231f;
}

.app-mark {
  border-color: rgba(255, 253, 247, 0.5);
  box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.045);
}

.app-main {
  width: min(1320px, calc(100vw - 88px));
  padding-top: 22px;
}

.app-header {
  grid-template-columns: minmax(0, 1fr) minmax(240px, 320px);
  padding-bottom: 20px;
}

.app-header h1 {
  max-width: 880px;
  font-size: clamp(42px, 5.2vw, 72px);
  letter-spacing: 0;
}

.app-header p {
  max-width: 900px;
  font-size: 15px;
}

.header-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.header-meta span,
.source-card span,
.source-card small,
.action-panel button,
.panel-heading button {
  color: var(--muted);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-meta span {
  padding: 5px 8px;
  border: 1px solid var(--line);
  background: rgba(255, 253, 247, 0.62);
}

.app-search {
  background: var(--paper-soft);
}

.source-ledger {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 1px;
  margin-top: 14px;
  border: 1px solid var(--line);
  background: var(--line);

.source-card {
  display: grid;
  gap: 6px;
  min-height: 82px;
  padding: 12px;
  background: rgba(255, 253, 247, 0.76);
  text-decoration: none;
}

.source-card strong {
  overflow-wrap: anywhere;
  font-size: 13px;
}

.source-card:hover,
.app-stats button:hover,
.panel-heading button:hover,
.action-panel button:hover {
  background: var(--paper-strong);
}

.app-stats {
  border: 1px solid var(--line);
  background: rgba(255, 253, 247, 0.56);
}

.app-stats button {
  cursor: pointer;
  transition: background 150ms ease, color 150ms ease;
}

.app-stats button:hover strong {
  color: var(--cyan);
}

.overview-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(240px, 300px);
  gap: 14px;
}

.overview-grid .primary-panel {
  grid-column: 1;
  grid-row: span 2;
}

.archive-panel {
  background: var(--paper-soft);
  box-shadow: 0 22px 70px rgba(48, 43, 34, 0.06);
}

.claim-dossier {
  border-top: 3px solid var(--ink);
}

.claim-line {
  font-size: clamp(19px, 1.7vw, 27px);
}

.triad section:first-child {
  border-top: 3px solid rgba(22, 141, 145, 0.28);
}

.triad section:nth-child(2) {
  border-top: 3px solid rgba(183, 121, 31, 0.34);
}

.triad section:nth-child(3) {
  border-top: 3px solid rgba(47, 125, 87, 0.34);
}

.action-panel {
  display: grid;
  align-content: start;
  gap: 10px;
  padding: 14px;
  border-top: 3px solid var(--clinical-green);
}

.action-panel h3 {
  font-size: 17px;
}

.action-panel button,
.panel-heading button {
  width: fit-content;
  min-height: 32px;
  padding: 7px 9px;
  border: 1px solid var(--line);
  background: rgba(255, 253, 247, 0.8);
  cursor: pointer;
}

.decision-brief {
  padding-bottom: 14px;
  border-top: 3px solid var(--review-amber);
}

.decision-brief h3,
.decision-brief p,
.decision-brief small {
  display: block;
  padding-right: 14px;
  padding-left: 14px;
}

.decision-brief h3 {
  padding-top: 14px;
  font-size: 15px;
}

.decision-brief p {
  padding-top: 8px;
}

.decision-brief small {
  padding-top: 10px;
  overflow-wrap: anywhere;
}

.index-panel {
  min-height: 220px;
}

.index-row {
  transition: background 150ms ease;
}

.index-row:hover {
  background: var(--paper-strong);
}

.artifact-row.is-planned span {
  color: var(--review-amber);
}

.artifact-row.is-active span,
.artifact-row.is-current span {
  color: var(--cyan);
}

.claim-app {
  grid-template-columns: minmax(210px, 260px) minmax(0, 1fr);
}

.record-list {
  position: sticky;
  top: 18px;
  max-height: calc(100svh - 36px);
  overflow: auto;
}

.app-timeline li {
  min-height: 82px;
}

.app-timeline li::before {
  background: var(--paper-strong);
}

.app-timeline li.is-complete::before {
  border-color: var(--clinical-green);
  background: var(--clinical-green);
}

.app-timeline li.is-planned::before,
.app-timeline li.is-active::before {
  border-color: var(--review-amber);
  background: var(--review-amber);
}

.app-timeline em {
  display: block;
  margin-top: 7px;
  color: #5e5545;
  font-size: 12px;
  font-style: normal;
}

.session-record[open] {
  background: rgba(255, 253, 247, 0.44);
}

.session-record summary a {
  text-align: right;
}

.empty-state {
  padding: 16px 14px;
  color: var(--muted);
  font-size: 13px;
}

@media (max-width: 1100px) {
  .app-main {
    width: min(100vw, 1320px);
  }

  .source-ledger {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .overview-grid,
  .overview-grid .primary-panel {
    grid-template-columns: 1fr;
    grid-column: auto;
  }

  .record-list {
    position: static;
    max-height: none;
  }
}

@media (max-width: 680px) {
  .source-ledger {
    grid-template-columns: 1fr;
  }

  .app-header h1 {
    font-size: 40px;
  }

  .header-meta {
    display: grid;
  }
}

/* Typography and spacing refinement: calmer scale, tighter rhythm, cleaner reading measure. */
:root {
  --content-max: 1184px;
  --rail-width: 332px;
  --gutter: clamp(20px, 3vw, 32px);
}

body {
  font-size: 14px;
  font-feature-settings: "kern" 1, "liga" 1, "tnum" 1;
}

.app-shell {
  grid-template-columns: 96px minmax(0, 1fr);
}

.app-rail {
  gap: 14px;
}

.app-mark {
  width: 44px;
  height: 44px;
  font-size: 18px;
}

.app-rail button {
  min-height: 38px;
  padding: 10px 16px;
  font-size: 12px;
}

.app-rail p {
  padding: 0 10px;
  font-size: 11px;
}

.app-main {
  width: min(var(--content-max), calc(100vw - 96px));
  padding: 34px var(--gutter) 44px;
}

.app-header {
  grid-template-columns: minmax(0, 760px) minmax(260px, 340px);
  gap: clamp(28px, 5vw, 72px);
  padding: 18px 0 26px;
  align-items: start;
}

.app-header h1 {

umeric negation windows, qualitative durations, unit-only durations, &quot;since&quot; forms, present-tense forms, remission, absence catch-all, and a past-tense negative test.<\/li><li>Test run: 26/26 passing under <code>python -m unittest discover -s tests<\/code>.<\/li><li>New paired 100-row smoke records:<\/li><li><a href=\"../../project_state/runs/20260424T144559Z_h002_multi_agent_verify_n100.json\">project_state/runs/20260424T144559Z_h002_multi_agent_verify_n100.json<\/a><\/li><li><a href=\"../../project_state/runs/20260424T144606Z_h001_single_pass_n100.json\">project_state/runs/20260424T144606Z_h001_single_pass_n100.json<\/a><\/li><li>Manifest updated: <a href=\"../../project_state/experiments/manifest.csv\">project_state/experiments/manifest.csv<\/a>.<\/li><\/ul>", "uncertainty": "<p>The 100-row slice is still a smoke test. NS precision on the multi harness is 0.73, so a small number of frequent/infrequent/UNK gold rows are now mispredicted as seizure-free. The qualitative pattern emits <code>seizure free for multiple month<\/code> regardless of whether the duration was actually in years, so rare exact-match cases for seizure-free-for-multiple-year still depend on numeric negation patterns rather than the qualitative fallback. Single-pass retains hard-coded <code>&quot;before&quot;<\/code>/<code>&quot;after&quot;<\/code> guards that suppress some valid matches when a whole letter is used as the single candidate.<\/p>", "handoff": "<p>Review the six NS false positives in the new multi confusion matrix and the remaining nine <code>seizure_free_error<\/code> cases to decide whether to add past-tense guards in specific patterns, then move on to the next failure family — most likely <code>unknown_or_no_reference_error<\/code> (34 cases on multi) or <code>cluster_error<\/code> (13 cases on multi) — before broadening beyond deterministic changes.<\/p>", "decision": "keep this harness variant", "href": "run_logs/20260424T144639Z_seizure_free_detection_expansion.md"} s/20260424T090341Z_visibility_phase1.md"}, {"title": "Candidate Retrieval Iteration Session", "date": "2026-04-24", "objective": "Improve deterministic seizure-frequency candidate retrieval, add focused tests, and rerun a paired 100-row synthetic smoke comparison.", "outcome": "<p>The deterministic harnesses gained a broader candidate-retrieval pass covering adjacent sentence windows, seizure-like event synonyms, ranged counts written with &quot;or&quot;, hyphenated modifiers, shared-window count summation, and dated event count lists. After the final retrieval update, the paired 100-row smoke comparison slightly favored <code>h002_multi_agent_verify<\/code>, so the expansion was kept as a baseline improvement candidate rather than discarded.<\/p>", "evidence": "<ul><li>Files changed in the retrieval-and-visibility commit <code>dd081bd3085172fc8dabcc66615cf4a3ec775470<\/code>:<\/li><li><code>src/epilepsy_agents/agents.py<\/code><\/li><li><code>tests/test_agents.py<\/code><\/li><li><code>docs/development_log.md<\/code><\/li><li><code>project_state/experiments/manifest.csv<\/code><\/li><li><code>project_state/harnesses/README.md<\/code><\/li><li>Intermediate 100-row smoke records after the broader retrieval expansion:<\/li><li><code>project_state/runs/20260424T085945Z_h002_multi_agent_verify_n100.json<\/code><\/li><li><code>project_state/runs/20260424T085948Z_h001_single_pass_n100.json<\/code><\/li><li>Final paired 100-row smoke records after the adjacent-window update:<\/li><li><code>project_state/runs/20260424T090105Z_h002_multi_agent_verify_n100.json<\/code><\/li><li><code>project_state/runs/20260424T090110Z_h001_single_pass_n100.json<\/code><\/li><li>Manifest summary:<\/li><li><code>project_state/experiments/manifest.csv<\/code><\/li><li>Follow-on note in the harness registry:<\/li><li><code>project_state/harnesses/README.md<\/code><\/li><li>Development summary:<\/li><li><code>docs/development_log.md<\/code><\/li><\/ul>", "uncertainty": "<p>The retrieval changes and the first visibility-artifact work were committed together, so this backfilled session isolates the harness iteration conceptually rather than claiming it was the only thing happening in the working tree. The metric lift is still small, and the remaining failures are substantial.<\/p>", "handoff": "<p>Classify the remaining <code>unknown_or_no_reference_error<\/code>, <code>seizure_free_error<\/code>, and <code>cluster_error<\/code> cases, then rerun the same paired 100-row slice before broadening the experiment surface.<\/p>", "decision": "Keep this harness variant.", "href": "run_logs/20260424T085900Z_candidate_retrieval_iteration.md"}, {"title": "Harness Protocol And Smoke Runs Session", "date": "2026-04-24", "objective": "Add a reproducible harness experiment workflow with stable IDs, structured run records, and the first paired smoke evaluations.", "outcome": "<p>The project moved from a scaffold with ad hoc smoke checks to a named harness study with an explicit research posture, structured experiment protocol, stable harness IDs, a run manifest, repo-local run records, and the first paired 20-row synthetic comparison for <code>h001_single_pass<\/code> and <code>h002_multi_agent_verify<\/code>.<\/p>", "evidence": "<ul><li>Files added in commit <code>91d2ba20f2d19c1589f0cc201037f7eeffbdf711<\/code>:<\/li><li><code>docs/research_program.md<\/code><\/li><li><code>docs/harness_experiment_protocol.md<\/code><\/li><li><code>scripts/run_harness_experiment.py<\/code><\/li><li><code>project_state/harnesses/README.md<\/code><\/li><li><code>project_state/experiments/manifest.csv<\/code><\/li><li><code>project_state/runs/20260424T083823Z_h002_multi_agent_verify_n20.json<\/code><\/li><li><code>project_state/runs/20260424T083902Z_h001_single_pass_n20.json<\/code><\/li><li>Visibility direction research also began in the same change set:<\/li><li><code>docs/agent_visibility_plan.md<\/code><\/li><li><code>docs/agent_visibility_ui_mockups.html<\/code><\/li><li>First paired smoke records:<\/li><li><code>project_state/runs/20260424T083823Z_h002_multi_agent_verify_n20.json<\/code><\/li><li><code>project_state/runs/20260424T083902Z_h001_single_pass_n20.json<\/code><\/li><li>Manifest entries:<\/li><li><code>project_state/experiments/manifest.csv<\/code><\/li><li>Supporting summary in <code>docs/development_log.md<\/code>:<\/li><li>initial 20-row paired smoke records were created for <code>h001_single_pass<\/code> and <code>h002_multi_agent_verify<\/code><\/li><\/ul>", "uncertainty": "<p>This log is also backfilled from the commit boundary, run manifest, and development notes. The exact point at which the visibility-plan research was interleaved with the harness protocol work is not separately logged, so the narrative here reflects the artifacts that survived rather than a minute-by-minute account.<\/p>", "handoff": "<p>Use the new run-ledger setup to iterate on one deterministic retrieval or verification change at a time, then rerun a fixed paired synthetic slice and keep only improvements that survive the metric bundle.<\/p>", "decision": "Implementation works but needs full synthetic evaluation.", "href": "run_logs/20260424T084000Z_harness_protocol_and_smoke_runs.md"}], "workstreams": [{"name": "Harness Reliability", "question": "How can the deterministic and future LLM-backed harnesses reduce seizure-frequency extraction errors while preserving evidence support and auditability?", "evidence": "<ul><li>Latest paired 100-row synthetic smoke runs (after seizure-free detection expansion):<\/li><li><code>h002_multi_agent_verify<\/code>: exact 0.31, monthly 0.48, pragmatic micro-F1 0.55, purist micro-F1 0.53, NS F1 0.82.<\/li><li><code>h001_single_pass<\/code>: exact 0.25, monthly 0.43, pragmatic micro-F1 0.50, purist micro-F1 0.48, NS F1 0.73.<\/li><li><code>seizure_free_error<\/code> dropped from 18 to 9 on multi and from 19 to 13 on single; <code>correct<\/code> rose from 20 to 31 on multi.<\/li><li>Run records: <a href=\"../project_state/runs/20260424T144559Z_h002_multi_agent_verify_n100.json\">multi n100<\/a>, <a href=\"../project_state/runs/20260424T144606Z_h001_single_pass_n100.json\">single n100<\/a>.<\/li><li>Session log: <a href=\"run_logs/20260424T144639Z_seizure_free_detection_expansion.md\">20260424T144639Z_seizure_free_detection_expansion.md<\/a>.<\/li><\/ul>", "risk": "<p>NS precision on the multi harness is 0.73, so a small number of gold-frequent/infrequent/UNK rows now fire the seizure-free catch-all. <code>unknown_or_no_reference_error<\/code> (34 on multi) and <code>cluster_error<\/code> (13 on multi) are now the largest remaining failure families.<\/p>", "next": "<p>Audit the six NS false positives and the nine residual <code>seizure_free_error<\/code> cases to judge whether to tighten past-tense guards, then target <code>unknown_or_no_reference_error<\/code> or <code>cluster_error<\/code> next and rerun the paired 100-row slice.<\/p>"}, {"name": "Provider And Local Model Setup", "question": "Which local runtime and first model should be used for schema-constrained extraction smoke tests?", "evidence": "<ul><li>The laptop has an RTX 4070 Laptop GPU with 8 GB VRAM and enough disk for quantized local inference.<\/li><li>No Ollama, LM Studio, vLLM, llama.cpp server, or direct inference stack is currently responding in the active environment.<\/li><li>Candidate model tiers are documented in <a href=\"local_model_feasibility.md\">local_model_feasibility.md<\/a>.<\/li><\/ul>", "risk": "<p>Local runtime installation and model download are not complete. Closed-provider experiments remain synthetic-only.<\/p>", "next": "<p>Configure one OpenAI-compatible local runtime and run a 25-letter schema-constrained smoke test.<\/p>"}, {"name": "Evidence Notebook Visibility", "question": "How should project state stay legible across long agent-assisted development sessions?", "evidence": "<ul><li>The chosen visibility direction is Evidence Notebook.<\/li><li>Phase 1 markdown pages now exist: <a href=\"current_state.md\">current_state.md<\/a>, <a href=\"milestones.md\">milestones.md<\/a>, <a href=\"active_threads.md\">active_threads.md<\/a>, <a href=\"decisions.md\">decisions.md<\/a>, and <a href=\"artifact_registry.md\">artifact_registry.md<\/a>.<\/li><li>Phase 2 session logging convention exists at <a href=\"run_logs/README.md\">run_logs/README.md<\/a>, with a template and optional JSON companion files.<\/li><li>The notebook archive now includes backfilled pre-visibility session logs for the initial scaffold, harness protocol, and retrieval iteration.<\/li><li>Phase 3 dashboard exists at <a href=\"evidence_notebook.html\">evidence_notebook.html<\/a>, generated by <a href=\"../src/epilepsy_agents/visibility.py\">src/epilepsy_agents/visibility.py<\/a>.<\/li><\/ul>", "risk": "<p>The source markdown layer is still hand-maintained, the dashboard can drift unless future sessions regenerate it after state updates, and the historical backfill is only as good as the surviving repo evidence behind it.<\/p>", "next": "<p>Use the dashboard for quick review, keep new session logs contemporaneous, regenerate after substantial closeouts, and proceed to the first curated Phase 4 visual artifact.<\/p>"}, {"name": "Visual And Dissertation Artifacts", "question": "Which explanatory visuals should be produced first for README, dissertation, and supervisor review?", "evidence": "<ul><li>The shared Clinical Blueprint + Evidence Highlighter visual language is defined in <a href=\"visual_artifacts_direction.md\">visual_artifacts_direction.md<\/a>.<\/li><li>The first target set includes architecture, deployment, dataset/evaluation, agent roles, milestones, local model feasibility, evidence grounding, and final packaging.<\/li><\/ul>", "risk": "<p>Generated visuals can become decorative if not tied to evidence and current project state.<\/p>", "next": "<p>Create the Project Architecture Poster first, using only synthetic/anonymised-looking text and sparse labels.<\/p>"}, {"name": "Real-Data Governance", "question": "How should the project prepare for possible real King&#x27;s College Hospital evaluation without leaking raw clinical content?", "evidence": "<ul><li>Governance rules are documented in <a href=\"real_data_governance.md\">real_data_governance.md<\/a>.<\/li><li>The research program explicitly prohibits autonomous loops on real clinical text and raw-text exports.<\/li><\/ul>", "risk": "<p>Any future real-data stage must happen inside the approved environment and may restrict providers, telemetry, examples, traces, screenshots, and artifacts.<\/p>", "next": "<p>Keep real-data support as an architecture constraint, not an active local-data workflow.<\/p>"}], "artifacts": [{"name": "Project specification", "purpose": "Define dissertation question, objectives, methods, data, metrics, and risks.", "status": "Current", "path": "<a href=\"project_specification.md\">project_specification.md<\/a>", "use": "Dissertation and orientation."}, {"name": "Research program", "purpose": "Operating brief for future agent-assisted work.", "status": "Current", "path": "<a href=\"research_program.md\">research_program.md<\/a>", "use": "Session orientation and scope control."}, {"name": "Evaluation protocol", "purpose": "Define metrics, baselines, controls, and standard commands.", "status": "Current", "path": "<a href=\"evaluation_protocol.md\">evaluation_protocol.md<\/a>", "use": "Experiment design and reporting."}, {"name": "Harness experiment protocol", "purpose": "Define reproducible run records and manifest conventions.", "status": "Current", "path": "<a href=\"harness_experiment_protocol.md\">harness_experiment_protocol.md<\/a>", "use": "Run logging and auditability."}, {"name": "Run manifest", "purpose": "Compact index of fixed-budget harness experiments.", "status": "Active", "path": "<a href=\"../project_state/experiments/manifest.csv\">manifest.csv<\/a>", "use": "Experiment lookup and dashboard source."}, {"name": "Run records", "purpose": "Structured ashboard.", "status": "Current", "path": "<a href=\"run_logs/20260424T093100Z_visibility_phase3.md\">20260424T093100Z_visibility_phase3.md<\/a>", "use": "Handoff and audit trail."}, {"name": "Seizure-free detection expansion session log", "purpose": "Record the deterministic seizure-free detection broadening and paired 100-row smoke results.", "status": "Current", "path": "<a href=\"run_logs/20260424T144639Z_seizure_free_detection_expansion.md\">20260424T144639Z_seizure_free_detection_expansion.md<\/a>", "use": "Handoff and audit trail."}, {"name": "Project Architecture Poster", "purpose": "Explain the multi-agent extraction pipeline visually.", "status": "Planned", "path": "To be generated.", "use": "README, dissertation figure, supervisor review."}, {"name": "Milestone Timeline", "purpose": "Show progress and next stages.", "status": "Planned", "path": "To be generated.", "use": "Dissertation and presentation support."}, {"name": "Local-First Hospital Deployment Diagram", "purpose": "Explain why real clinical text stays local.", "status": "Planned", "path": "To be generated.", "use": "Governance explanation."}, {"name": "Dataset and Evaluation Overview", "purpose": "Explain seizure-frequency labels and metric bundle.", "status": "Planned", "path": "To be generated.", "use": "Methods section and supervisor review."}], "decisions": [{"id": "D001", "title": "Treat The Project As A Harness-Reliability Study", "decision": "The central research posture is harness reliability, not a simple model leaderboard.", "rationale": "<p>The dissertation question is whether constrained, evidence-grounded extraction improves seizure-frequency reliability under matched budgets.<\/p>", "consequence": "<p>Each meaningful change should alter one harness, prompt, provider, verification rule, or visibility artifact, then be evaluated through a fixed metric bundle.<\/p>", "evidence": "<a href=\"research_program.md\">research_program.md<\/a>, <a href=\"harness_experiment_protocol.md\">harness_experiment_protocol.md<\/a>."}, {"id": "D002", "title": "Keep Deterministic Baselines Before LLM Expansion", "decision": "The repository starts with deterministic <code>single<\/code> and <code>multi<\/code> harnesses that mirror planned role boundaries.", "rationale": "<p>This gives a reproducible offline baseline before provider variance, cost, latency, and schema failures enter the study.<\/p>", "consequence": "<p>Deterministic metrics provide the first comparison floor, but the system must not claim final LLM or clinical performance from them.<\/p>", "evidence": "<a href=\"project_specification.md\">project_specification.md<\/a>, <a href=\"../project_state/harnesses/README.md\">project_state/harnesses/README.md<\/a>, <a href=\"../project_state/experiments/manifest.csv\">project_state/experiments/manifest.csv<\/a>."}, {"id": "D003", "title": "Use The Pareto Frontier Rule For Harness Selection", "decision": "Keep candidate harnesses that are non-dominated across reliability, evidence support, invalid-output behavior, and cost/runtime rather than forcing a single early winner.", "rationale": "<p>Clinical extraction quality is multi-dimensional. A slightly better F1 score may not be worth unsupported claims or poor abstention behavior.<\/p>", "consequence": "<p>Run records must retain enough information to compare class F1, monthly-rate accuracy, exact label accuracy, safe error categories, and later provider/runtime metadata.<\/p>", "evidence": "<a href=\"harness_experiment_protocol.md\">harness_experiment_protocol.md<\/a>, <a href=\"evaluation_protocol.md\">evaluation_protocol.md<\/a>."}, {"id": "D004", "title": "Keep Closed Providers Synthetic-Only Unless Governance Changes", "decision": "Closed-provider experiments are acceptable only for synthetic data in the current repository context.", "rationale": "<p>Real clinical text must not leave the approved environment or enter external logs, traces, prompts, screenshots, or artifacts without explicit governance a     <script>

const data = JSON.parse(document.getElementById("notebook-data").textContent);
const app = document.getElementById("app");

const views = [
  ["overview", "Overview"],
  ["claims", "Claims"],
  ["timeline", "Timeline"],
  ["sessions", "Sessions"],
  ["workstreams", "Workstreams"],
  ["artifacts", "Artifacts"],
  ["decisions", "Decisions"],
];

const statTargets = {
  claims: "claims",
  milestones: "timeline",
  sessions: "sessions",
  threads: "workstreams",
  artifacts: "artifacts",
  decisions: "decisions",
};

let state = {
  view: location.hash.replace("#", "") || "overview",
  query: "",
  selectedClaim: 0,
};

function textFromHtml(value) {
  const div = document.createElement("div");
  div.innerHTML = value || "";
  return div.textContent || "";
}

function includesQuery(record) {
  if (!state.query) return true;
  const haystack = JSON.stringify(record).toLowerCase();
  return haystack.includes(state.query.toLowerCase());
}

function filtered(records) {
  return records.filter(includesQuery);
}

function setView(view) {
  state.view = view;
  location.hash = view;
  render();
}

function render() {
  const activeView = views.some(([id]) => id === state.view) ? state.view : "overview";
  state.view = activeView;
  app.dataset.view = activeView;
  app.innerHTML = `
    <aside class="app-rail">
      <a class="app-mark" href="#overview" data-view-link="overview">EN</a>
      <nav>${views.map(([id, label]) => `<button type="button" class="${id === activeView ? "is-active" : ""}" data-view-link="${id}">${label}</button>`).join("")}</nav>
      <p>Local archive<br>${data.generatedAt}</p>
    </aside>
    <main class="app-main">
      <header class="app-header">
        <div>
          <p class="app-kicker">Clinical evidence register</p>
          <h1>Evidence Notebook</h1>
          <p>${data.latestClaim.claim}</p>
          <div class="header-meta">
            <span>Generated ${data.generatedAt}</span>
            <span>${data.latestClaim.title}</span>
          </div>
        </div>
        <label class="app-search">
          <span>Search</span>
          <input type="search" value="${escapeAttr(state.query)}" placeholder="claims, sessions, artifacts..." />
        </label>
      </header>
      <section class="source-ledger">${data.sources.map((source, index) => sourceCard(source, data.sourceFreshness[index])).join("")}</section>
      <section class="app-stats">${data.stats.map((item) => statButton(item)).join("")}</section>
      <section class="app-view">${renderView(activeView)}</section>
    </main>
  `;

  app.querySelectorAll("[data-view-link]").forEach((button) => {
    button.addEventListener("click", (event) => {
      event.preventDefault();
      setView(button.dataset.viewLink);
    });
  });

  const search = app.querySelector(".app-search input");
  search.addEventListener("input", (event) => {
    state.query = event.target.value;
    render();
    const next = app.querySelector(".app-search input");
    next.focus();
    next.setSelectionRange(next.value.length, next.value.length);
  });

  app.querySelectorAll("[data-select-claim]").forEach((button) => {
    button.addEventListener("click", () => {
      state.selectedClaim = Number(button.dataset.selectClaim);
      render();
    });
  });
}

function renderView(view) {
  if (view === "overview") return renderOverview();
  if (view === "claims") return renderClaims();
  if (view === "timeline") return renderTimeline();
  if (view === "sessions") return renderSessions();
  if (view === "workstreams") return renderWorkstreams();
  if (view === "artifacts") return renderArtifacts();
  if (view === "decisions") return renderDecisions();
  return renderOverview();
}

function renderOverview() {
  const claim = data.claims[state.selectedClaim] || data.claims[0];
  const latestDecision = data.decisions[0];
  return `
    <div class="overview-grid">
      ${claimDossier(claim, "Current claim")}
      <aside class="archive-panel action-panel">
        <p class="app-kicker">Active path</p>
        <h3>${data.activeMilestone.name}</h3>
        <p>${data.activeMilestone.next}</p>
        <button type="button" data-view-link="timeline">Open timeline</button>
      </aside>
      <section class="archive-panel index-panel session-panel">
        <div class="panel-heading row">
          <div><p class="app-kicker">Run ledger</p><h2>Recent Sessions</h2></div>
          <button type="button" data-view-link="sessions">View all</button>
        </div>
        ${rowsOrEmpty(data.sessions.slice(0, 3).map(sessionRow), "No session logs recorded.")}
      </section>
      <section class="archive-panel index-panel artifact-panel">
        <div class="panel-heading row">
          <div><p class="app-kicker">Output register</p><h2>Artifact Shelf</h2></div>
          <button type="button" data-view-link="artifacts">View all</button>
        </div>
        ${rowsOrEmpty(data.artifacts.slice(0, 5).map(artifactRow), "No artifacts recorded.")}
      </section>
      <section class="archive-panel decision-brief">
        <div class="panel-heading">
          <p class="app-kicker">Decision anchor</p>
          <h2>${latestDecision ? latestDecision.id : "None"}</h2>
        </div>
        ${latestDecision ? `<h3>${latestDecision.title}</h3><p>${latestDecision.decision}</p><small>${latestDecision.evidence}</small>` : `<p>No decisions recorded.</p>`}
      </section>
    </div>
  `;
}

function renderClaims() {
  const claims = filtered(data.claims);
  const selected = claims[state.selectedClaim] || claims[0] || data.claims[0];
  if (!selected) return emptyState("No matching claims.");
  return `
    <div class="claim-app">
      <aside class="record-list">
        ${claims.map((claim, index) => `<button type="button" class="${claim === selected ? "is-active" : ""}" data-select-claim="${index}"><span>${pad(index + 1)}</span>${claim.title}</button>`).join("")}
      </aside>
      ${claimDossier(selected, "Claim record")}
    </div>
  `;
}

function renderTimeline() {
  const milestones = filtered(data.milestones);
  return `<section class="archive-panel timeline-panel"><div class="panel-heading"><p class="app-kicker">Milestone spine</p><h2>Timeline</h2></div>${renderTimelineSummary(milestones)}<ol class="app-timeline">${rowsOrEmpty(milestones.map((item) => `
    <li class="${statusClass(item.status)}">
      <span>${item.status}</span>
      <div><h3>${item.title}</h3><p>${item.outcome}</p><small>${item.evidence}</small><em>${item.next}</em></div>
    </li>`), "No matching milestones.")}</ol></section>`;
}

function renderTimelineSummary(milestones) {
  if (!milestones.length) return emptyState("No matching milestones.");
  const keyEvents = timelineKeyEvents(milestones);
  const completed = milestones.filter((item) => normalizedStatus(item.status) === "complete").length;
  const next = milestones.find((item) => normalizedStatus(item.status) !== "complete") || milestones[milestones.length - 1];
  const progress = Math.round((completed / milestones.length) * 100);
  return `<div class="timeline-summary">
    <section class="timeline-progress">
      <div>
        <p class="app-kicker">Progress map</p>
        <strong>${completed}/${milestones.length}</strong>
        <span>milestones complete</span>
      </div>
      <div class="progress-rail" aria-hidden="true"><i style="width: ${progress}%"></i></div>
      <p><b>Next visible move</b>${next ? next.title : "No next milestone recorded"}</p>
    </section>
    <section class="timeline-keyline">
      <div class="keyline-heading">
        <p class="app-kicker">Key sequence</p>
        <h3>Major events</h3>
      </div>
      <ol>${keyEvents.map((event, index) => `<li class="${statusClass(event.status)}">
        <span>${pad(index + 1)}</span>
        <strong>${event.title}</strong>
        <small>${event.status}</small>
      </li>`).join("")}</ol>
    </section>
  </div>`;
}

function timelineKeyEvents(milestones) {
  const patterns = [/project frame/i, /synthetic subset/i, /evaluation harness/i, /smoke/i, /local model/i, /local dashboard/i, /visual artifacts/i];
  const picked = [];
  patterns.forEach((pattern) => {
    const item = milestones.find((milestone) => pattern.test(milestone.title));
    if (item && !picked.includes(item)) picked.push(item);
  });
  if (picked.length < 4) {
    milestones.forEach((item) => {
      if (picked.length < 4 && !picked.includes(item)) picked.push(item);
    });
  }
  return picked.slice(0, 7);
}

function normalizedStatus(status) {
  return String(status || "").toLowerCase();
}

function renderSessions() {
  const sessions = filtered(data.sessions);
  return `<section class="archive-panel"><div class="panel-heading"><p class="app-kicker">Run ledger</p><h2>Recent Session Feed</h2></div>${rowsOrEmpty(sessions.map((session) => `
    <details class="session-record" open>
      <summary><span>${session.date}</span><strong>${session.title}</strong><a href="${session.href}">source log</a></summary>
      <p>${session.objective}</p>
      <div class="quad">
        <section><b>Outcome</b>${session.outcome}</section>
        <section><b>Evidence</b>${session.evidence}</section>
        <section><b>Uncertainty</b>${session.uncertainty}</section>
        <section><b>Handoff</b>${session.handoff}</section>
      </div>
      <footer>${session.decision}</footer>
    </details>`), "No matching session logs.")}</section>`;
}

function renderWorkstreams() {
  const workstreams = filtered(data.workstreams);
  return `<div class="card-grid">${rowsOrEmpty(workstreams.map((thread) => `
    <article class="archive-panel">
      <div class="panel-heading"><p class="app-kicker">Thread</p><h2>${thread.name}</h2></div>
      <p class="body-lead">${thread.question}</p>
      <div class="stacked-fields">
        <section><b>Latest evidence</b>${thread.evidence}</section>
        <section><b>Risk</b>${thread.risk}</section>
        <section><b>Next action</b>${thread.next}</section>
      </div>
    </article>`), "No matching workstreams.")}</div>`;
}

function renderArtifacts() {
  const artifacts = filtered(data.artifacts);
  return `<section class="archive-panel"><div class="panel-heading"><p class="app-kicker">Artifact shelf</p><h2>Outputs And Planned Visuals</h2></div><div class="shelf">${rowsOrEmpty(artifacts.map(artifactRow), "No matching artifacts.")}</div></section>`;
}

function renderDecisions() {
  const decisions = filtered(data.decisions);
  return `<section class="archive-panel"><div class="panel-heading"><p class="app-kicker">Decision register</p><h2>Decisions</h2></div>${rowsOrEmpty(decisions.map((decision) => `
    <article class="decision-record">
      <span>${decision.id}</span>
      <div><h3>${decision.title}</h3><p>${decision.decision}</p></div>
      <section><b>Consequence</b>${decision.consequence}<small>${decision.evidence}</small></section>
    </article>`), "No matching decisions.")}</section>`;
}

function claimDossier(claim, label) {
  return `<section class="archive-panel primary-panel claim-dossier">
    <div class="panel-heading">
      <p class="app-kicker">${label}</p>
      <h2>${claim.title}</h2>
    </div>
    <p class="claim-line">${claim.claim}</p>
    <div class="triad">
      <section><b>Evidence</b>${claim.evidence}</section>
      <section><b>Uncertainty</b>${claim.uncertainty}</section>
      <section><b>Next action</b>${claim.next}</section>
    </div>
  </section>`;
}

function sourceCard(source, freshness) {
  return `<a class="source-card" href="${source.href}">
    <span>Source</span>
    <strong>${source.label}</strong>
    <small>Updated ${freshness ? freshness.updated : "Not recorded"}</small>
  </a>`;
}

function statButton(item) {
  const key = item.label.toLowerCase();
  const target = statTargets[key] || "overview";
  return `<button type="button" data-view-link="${target}"><strong>${item.value}</strong><span>${item.label}</span></button>`;
}

function sessionRow(session) {
  return `<article class="index-row"><span>${session.date}</span><strong>${session.title}</strong><small>${session.decision}</small></article>`;
}

function artifactRow(item) {
  return `<article class="index-row artifact-row ${statusClass(item.status)}"><span>${item.status}</span><strong>${item.name}</strong><small>${item.path}</small></article>`;
}

function rowsOrEmpty(rows, message) {
  return rows.length ? rows.join("") : emptyState(message);
}

function emptyState(message) {
  return `<p class="empty-state">${message}</p>`;
}

function statusClass(status) {
  return `is-${String(status || "unknown").toLowerCase().replace(/[^a-z0-9]+/g, "-")}`;
}

function pad(value) {
  return String(value).padStart(2, "0");
}

function escapeAttr(value) {
  return String(value || "").replaceAll("&", "&amp;").replaceAll('"', "&quot;").replaceAll("<", "&lt;");
}

window.addEventListener("hashchange", () => {
  state.view = location.hash.replace("#", "") || "overview";
  render();
});

render();

    </script>
  </body>
</html>
